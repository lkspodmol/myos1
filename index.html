<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
  <style>

@keyframes fadeOut {
    from { opacity: 1; }
    to { opacity: 0; }
}

  </style>
  <body style="
    margin:0;
    background:#000;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
">
<img id="loadingScreen" src="./website/images/crt/f11.jpg" style="pointer-events: none; animation: fadeOut 0.5s ease-in forwards; animation-delay: 2s; position: absolute; width: 100%; height: 100%; object-fit: cover; z-index: 999999;"/>
    <img src="./website/images/crt/crt.jpg" style="width:100%; height:100%; display:block;"/>
    <div>
      <iframe id="hamos"
    src="./index-old.html"
      style="
          position:absolute;
          left:25.7%;
          top:13%;
          width:64%; 
          height:81%;
          border:none;
          transform:scale(.8);
          transform-origin:top left;
          visibility:hidden;
      ">
</iframe>
    </div>
    <div id="onbutton" style="
      position:absolute;
      right:20.5%;
      bottom:7%;
      width:6.5%;
      padding:0;
      border:none;
      background:transparent;
      cursor:pointer;
    ">
      <img src="./website/images/crt/onbutton.png" style="width:90%; height:90%;">
    </div>
    <div style="
      position:absolute;
      right:23.6%;
      bottom:11.5%;
      width:6.5%;
      padding:0;
      border:none;
      background:transparent;
    ">
      <img id="off" src="./website/images/crt/off.png" style="width:35%; height:35%;">
    </div>
    <div style="
      position:absolute;
      right:23.6%;
      bottom:11.5%;
      width:6.5%;
      padding:0;
      border:none;
      background:transparent;
    ">
      <img id="on" src="./website/images/crt/on.png" style="visibility:hidden; width:35%; height:35%;">
    </div>
<script>
const button = document.getElementById("onbutton");
const onLed = document.getElementById("on");
const iframe = document.getElementById("hamos");

let powerOn = false;

button.addEventListener("click", () => {
    powerOn = !powerOn;

    if (powerOn) {
        iframe.src = iframe.src;
        setTimeout(() => {
            onLed.style.visibility = "visible";
        }, 200);
        setTimeout(() => {
            onLed.style.visibility = "hidden"; 
        }, 1000);
        setTimeout(() => {
            onLed.style.visibility = "visible";
        }, 1500);
        setTimeout(() => {
            onLed.style.visibility = "hidden";
        }, 2000);
        setTimeout(() => {
            onLed.style.visibility = "visible";
        }, 2500);
        setTimeout(() => {
            iframe.style.visibility = "visible";
        }, 3000);
        setTimeout(() => {
            onLed.style.visibility = "hidden"; 
        }, 3500);
        setTimeout(() => {
            onLed.style.visibility = "visible";
        }, 4000);
        setTimeout(() => {
            onLed.style.visibility = "hidden";
        }, 4500);
        setTimeout(() => {
            onLed.style.visibility = "visible";
        }, 5000);
        setTimeout(() => {
            onLed.style.visibility = "hidden";
        }, 5500);
        setTimeout(() => {
            onLed.style.visibility = "visible";
        }, 6000);
    } else {
        onLed.style.visibility = "hidden";
        iframe.style.visibility = "hidden";
    }
}); // takze to =! je jako NOT gate, potom kdyz tak, ... listenuje pro klik a nahore pojmenovani
</script>
  </body>
</html>
